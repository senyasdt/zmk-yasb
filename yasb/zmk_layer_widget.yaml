# Paste this under the `widgets:` section in your YASB config.
zmk_layer:
  type: "yasb.custom.CustomWidget"
  options:
    label: "<span class='zmk-layer-icon'>⌨</span> {data[status]} · {data[label]} · {data[battery_label]}"
    label_alt: "<span class='zmk-layer-icon'>⌨</span> {data[status]} · {data[label]} · {data[effective]} · {data[battery_label]}"
    class_name: "zmk-layer-widget"
    exec_options:
      run_cmd: 'cmd /c type %APPDATA%\zmk-yasb\state.json'
      run_interval: 250
      return_format: "json"
